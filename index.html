<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解説付き・試験ツール</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin-bottom: 20px; box-sizing: border-box; }
        .hidden { display: none; }
        .q-container { border-bottom: 2px solid #eee; padding: 20px 0; }
        .q-text { font-weight: bold; margin-bottom: 10px; font-size: 1.1rem; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .opt-label { display: block; padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .opt-label:hover { background: #f8f9fa; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        
        /* 採点後のスタイル */
        .correct-ans { background: #d4edda !important; border-color: #28a745 !important; font-weight: bold; }
        .wrong-ans { background: #f8d7da !important; border-color: #dc3545 !important; }
        .explanation-box { margin-top: 15px; padding: 15px; background: #e7f3ff; border-left: 5px solid #007bff; border-radius: 4px; font-size: 0.9rem; line-height: 1.5; color: #333; }

        button { cursor: pointer; padding: 15px 25px; border: none; border-radius: 8px; background: #007bff; color: white; font-size: 1rem; width: 100%; margin: 10px 0; }
        .sub-btn { background: #6c757d; }
        .genre-tag { background: #e2e3e5; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        #score-banner { font-size: 1.5rem; font-weight: bold; color: #007bff; text-align: center; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

    <div id="setup-view" class="card">
        <h2>試験を開始する</h2>
        <p>ジャンルを選んで30問（以内）に挑戦！</p>
        <select id="select-genre-play" style="width:100%; padding:10px; margin-bottom:10px;"></select>
        <button onclick="startExam()">試験開始！</button>
        <hr>
        <button class="sub-btn" onclick="switchView('edit-view')">問題を追加・管理する</button>
    </div>

    <div id="exam-view" class="card hidden">
        <div id="score-banner"></div>
        <div id="questions-list"></div>
        <button id="submit-btn" onclick="gradeExam()">回答を終了して採点する</button>
        <button id="back-btn" class="sub-btn hidden" onclick="switchView('setup-view')">トップに戻る</button>
    </div>

    <div id="edit-view" class="card hidden">
        <h2>問題の管理</h2>
        <input type="text" id="input-genre" placeholder="ジャンル名">
        <input type="text" id="input-q" placeholder="問題文">
        <input type="text" id="input-a" placeholder="正解" style="border-left:5px solid #28a745;">
        <input type="text" id="input-w1" placeholder="ハズレ1">
        <input type="text" id="input-w2" placeholder="ハズレ2">
        <input type="text" id="input-w3" placeholder="ハズレ3">
        <textarea id="input-note" placeholder="解説（採点後に表示されます）" style="width:100%; height:80px; padding:10px; border-radius:5px; border:1px solid #ddd; box-sizing:border-box; margin:5px 0;"></textarea>
        <button onclick="addQuestion()" style="background:#28a745;">追加する</button>
        <button class="sub-btn" onclick="switchView('setup-view')">戻る</button>
        <hr>
        <ul id="q-list" style="font-size:0.8rem; text-align:left;"></ul>
    </div>

    <script>
        // 保存場所はV5にアップデート（解説データを含むため）
        let questions = JSON.parse(localStorage.getItem('myQuizDataV5')) || [];
        let currentExamData = [];

        function switchView(viewId) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'setup-view') updateGenreSelect();
            if(viewId === 'edit-view') renderList();
        }

        function updateGenreSelect() {
            const select = document.getElementById('select-genre-play');
            const genres = [...new Set(questions.map(q => q.g))];
            select.innerHTML = '<option value="all">すべてのジャンル</option>';
            genres.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g; opt.textContent = g;
                select.appendChild(opt);
            });
        }

        function addQuestion() {
            const g = document.getElementById('input-genre').value || "未分類";
            const q = document.getElementById('input-q').value, a = document.getElementById('input-a').value;
            const w1 = document.getElementById('input-w1').value, w2 = document.getElementById('input-w2').value, w3 = document.getElementById('input-w3').value;
            const note = document.getElementById('input-note').value || "解説はありません。";
            
            if(!q || !a || !w1 || !w2 || !w3) return alert("選択肢をすべて入力してください");

            questions.push({g, q, a, w: [w1, w2, w3], note});
            localStorage.setItem('myQuizDataV5', JSON.stringify(questions));
            
            ["input-q", "input-a", "input-w1", "input-w2", "input-w3", "input-note"].forEach(id => document.getElementById(id).value = "");
            renderList();
            alert("追加しました！");
        }

        function renderList() {
            const list = document.getElementById('q-list');
            list.innerHTML = '';
            questions.forEach((item, index) => {
                const li = document.createElement('li');
                li.style.marginBottom = "8px";
                li.innerHTML = `[${item.g}] <b>${item.q}</b> <span style="color:red; cursor:pointer;" onclick="deleteQ(${index})">[削除]</span>`;
                list.appendChild(li);
            });
        }

        function deleteQ(index) {
            if(confirm("削除しますか？")) {
                questions.splice(index, 1);
                localStorage.setItem('myQuizDataV5', JSON.stringify(questions));
                renderList();
            }
        }

        function startExam() {
            const selectedGenre = document.getElementById('select-genre-play').value;
            let targetList = (selectedGenre === 'all') ? questions : questions.filter(q => q.g === selectedGenre);
            if(targetList.length === 0) return alert("問題がありません");

            currentExamData = [...targetList].sort(() => Math.random() - 0.5).slice(0, 30);
            
            const listArea = document.getElementById('questions-list');
            listArea.innerHTML = '';
            document.getElementById('score-banner').style.display = 'none';
            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('back-btn').classList.add('hidden');

            currentExamData.forEach((qData, i) => {
                const options = [qData.a, ...qData.w].sort(() => Math.random() - 0.5);
                const qDiv = document.createElement('div');
                qDiv.className = 'q-container';
                qDiv.id = `q-block-${i}`;
                qDiv.innerHTML = `
                    <div class="q-text">${i+1}. <span class="genre-tag">${qData.g}</span> ${qData.q}</div>
                    <div class="options-grid" id="q${i}-opts">
                        ${options.map(opt => `
                            <label class="opt-label">
                                <input type="radio" name="q${i}" value="${opt}"> ${opt}
                            </label>
                        `).join('')}
                    </div>
                    <div id="note-${i}" class="explanation-box hidden">
                        <strong>💡 解説:</strong><br>${qData.note}
                    </div>
                `;
                listArea.appendChild(qDiv);
            });
            switchView('exam-view');
            window.scrollTo(0,0);
        }

        function gradeExam() {
            let score = 0;
            currentExamData.forEach((qData, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const optsDiv = document.getElementById(`q${i}-opts`);
                const labels = optsDiv.querySelectorAll('.opt-label');

                labels.forEach(label => {
                    const val = label.innerText.trim();
                    if(val === qData.a) label.classList.add('correct-ans');
                    if(selected && selected.value === val && val !== qData.a) label.classList.add('wrong-ans');
                });

                // 解説ボックスを表示
                document.getElementById(`note-${i}`).classList.remove('hidden');

                if(selected && selected.value === qData.a) score++;
            });

            const banner = document.getElementById('score-banner');
            banner.style.display = 'block';
            banner.innerHTML = `試験結果: ${currentExamData.length}問中 ${score}問正解！`;
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        updateGenreSelect();
    </script>
</body>
</html>
