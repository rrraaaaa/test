<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4択クイズメーカー</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .hidden { display: none; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 20px; border: none; border-radius: 8px; background: #007bff; color: white; margin: 5px; transition: 0.2s; font-size: 1rem; }
        button:hover { opacity: 0.8; }
        .option-btn { background: #ffffff; color: #333; border: 2px solid #007bff; width: 100%; text-align: left; margin: 8px 0; }
        .option-btn:hover { background: #e7f1ff; }
        .option-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .option-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .sub-btn { background: #6c757d; }
        .add-btn { background: #28a745; width: 100%; margin-top: 10px; }
        .q-text { font-size: 1.2rem; font-weight: bold; margin: 15px 0; }
        .genre-tag { display: inline-block; background: #e2e3e5; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 5px; }
        .result-msg { font-weight: bold; margin-top: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="setup-view" class="card">
        <h2>4択クイズに挑戦</h2>
        <p>ジャンルを選択してください</p>
        <select id="select-genre-play"></select>
        <button onclick="startQuiz()">スタート！</button>
        <hr>
        <button class="sub-btn" onclick="switchView('edit-view')">問題を追加・管理する</button>
    </div>

    <div id="play-view" class="card hidden">
        <div id="genre-display" class="genre-tag"></div>
        <div id="q-display" class="q-text"></div>
        
        <div id="options-area">
            </div>
        
        <div id="result-display" class="result-msg"></div>
        <button id="next-btn" class="add-btn hidden" onclick="nextQuestion()">次の問題へ</button>
        <hr>
        <button class="sub-btn" onclick="switchView('setup-view')">中断して戻る</button>
    </div>

    <div id="edit-view" class="card hidden">
        <h2>問題の追加 (4択)</h2>
        <input type="text" id="input-genre" placeholder="ジャンル名">
        <input type="text" id="input-q" placeholder="問題文">
        <input type="text" id="input-a" placeholder="正解（選択肢1になります）" style="border-left: 5px solid #28a745;">
        <input type="text" id="input-w1" placeholder="ハズレ1">
        <input type="text" id="input-w2" placeholder="ハズレ2">
        <input type="text" id="input-w3" placeholder="ハズレ3">
        <button class="add-btn" onclick="addQuestion()">追加する</button>
        <button class="sub-btn" onclick="switchView('setup-view')">戻る</button>
        <hr>
        <ul id="q-list" style="text-align: left; font-size: 0.8rem;"></ul>
    </div>

    <script>
        let questions = JSON.parse(localStorage.getItem('myQuizDataV4')) || [];
        let currentIdx = 0;
        let shuffled = [];

        function switchView(viewId) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'setup-view') updateGenreSelect();
            if(viewId === 'edit-view') renderList();
        }

        function updateGenreSelect() {
            const select = document.getElementById('select-genre-play');
            const genres = [...new Set(questions.map(q => q.g))];
            select.innerHTML = '<option value="all">すべてのジャンル</option>';
            genres.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g; opt.textContent = g;
                select.appendChild(opt);
            });
        }

        function addQuestion() {
            const g = document.getElementById('input-genre').value || "未分類";
            const q = document.getElementById('input-q').value;
            const a = document.getElementById('input-a').value;
            const w1 = document.getElementById('input-w1').value;
            const w2 = document.getElementById('input-w2').value;
            const w3 = document.getElementById('input-w3').value;

            if(!q || !a || !w1 || !w2 || !w3) return alert("すべて入力してください");

            questions.push({g, q, a, w: [w1, w2, w3]});
            localStorage.setItem('myQuizDataV4', JSON.stringify(questions));
            
            ["input-q", "input-a", "input-w1", "input-w2", "input-w3"].forEach(id => document.getElementById(id).value = "");
            renderList();
            alert("追加しました！");
        }

        function renderList() {
            const list = document.getElementById('q-list');
            list.innerHTML = '';
            questions.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `[${item.g}] ${item.q} (消す)`;
                li.style.cursor = "pointer";
                li.onclick = () => { if(confirm("削除？")) { questions.splice(index, 1); localStorage.setItem('myQuizDataV4', JSON.stringify(questions)); renderList(); } };
                list.appendChild(li);
            });
        }

        function startQuiz() {
            const selectedGenre = document.getElementById('select-genre-play').value;
            let targetList = (selectedGenre === 'all') ? questions : questions.filter(q => q.g === selectedGenre);
            if(targetList.length === 0) return alert("問題がありません");
            
            shuffled = [...targetList].sort(() => Math.random() - 0.5);
            currentIdx = 0;
            switchView('play-view');
            showQ();
        }

        function showQ() {
            const qData = shuffled[currentIdx];
            document.getElementById('genre-display').textContent = qData.g;
            document.getElementById('q-display').textContent = qData.q;
            document.getElementById('result-display').textContent = "";
            document.getElementById('next-btn').classList.add('hidden');

            // 選択肢の作成（正解1つ + ハズレ3つを混ぜる）
            const options = [qData.a, ...qData.w].sort(() => Math.random() - 0.5);
            const area = document.getElementById('options-area');
            area.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(btn, opt, qData.a);
                area.appendChild(btn);
            });
        }

        function checkAnswer(clickedBtn, selected, actual) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true); // 連打防止

            if (selected === actual) {
                clickedBtn.classList.add('correct');
                document.getElementById('result-display').innerHTML = "⭕ 正解！";
                document.getElementById('result-display').style.color = "#28a745";
            } else {
                clickedBtn.classList.add('wrong');
                document.getElementById('result-display').innerHTML = `❌ 不正解... (正解: ${actual})`;
                document.getElementById('result-display').style.color = "#dc3545";
                // 正解のボタンを強調
                btns.forEach(b => { if(b.textContent === actual) b.classList.add('correct'); });
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < shuffled.length) {
                showQ();
            } else {
                alert("終了！");
                switchView('setup-view');
            }
        }

        updateGenreSelect();
    </script>
</body>
</html>
