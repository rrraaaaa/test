<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャンル別クイズメーカー</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; }
        .hidden { display: none; }
        input, textarea, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 20px; border: none; border-radius: 8px; background: #007bff; color: white; margin: 5px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button.sub { background: #6c757d; }
        button.add { background: #28a745; width: 90%; }
        .q-text { font-size: 1.2rem; font-weight: bold; margin: 20px 0; min-height: 50px; }
        .a-text { color: #d9534f; font-weight: bold; margin: 15px 0; min-height: 24px; border-top: 1px dashed #ddd; padding-top: 10px; }
        .genre-tag { display: inline-block; background: #e2e3e5; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="setup-view" class="card">
        <h2>学習を始める</h2>
        <p>解きたいジャンルを選択してください</p>
        <select id="select-genre-play"></select>
        <button onclick="startQuiz()">スタート！</button>
        <hr>
        <button class="sub" onclick="switchView('edit-view')">問題を追加・管理する</button>
    </div>

    <div id="play-view" class="card hidden">
        <div id="genre-display" class="genre-tag"></div>
        <div id="q-display" class="q-text"></div>
        <div id="a-display" class="a-text"></div>
        <button id="show-btn" onclick="showAnswer()">答えを表示</button>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">次の問題へ</button>
        <hr>
        <button class="sub" onclick="switchView('setup-view')">ジャンル選択に戻る</button>
    </div>

    <div id="edit-view" class="card hidden">
        <h2>問題の追加</h2>
        <input type="text" id="input-genre" placeholder="ジャンル名（例：心理学、経済、英語）">
        <input type="text" id="input-q" placeholder="問題文">
        <textarea id="input-a" placeholder="正解の内容"></textarea>
        <button class="add" onclick="addQuestion()">このジャンルで追加</button>
        <button class="sub" onclick="switchView('setup-view')">戻る</button>
        <hr>
        <h3>登録済みリスト (クリックで削除)</h3>
        <ul id="q-list" style="text-align: left; font-size: 0.9rem;"></ul>
    </div>

    <script>
        let questions = JSON.parse(localStorage.getItem('myQuizDataV2')) || [];
        let currentIdx = 0;
        let shuffled = [];

        function switchView(viewId) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'setup-view') updateGenreSelect();
            if(viewId === 'edit-view') renderList();
        }

        // ジャンル選択肢の更新
        function updateGenreSelect() {
            const select = document.getElementById('select-genre-play');
            const genres = [...new Set(questions.map(q => q.g))]; // 重複削除
            select.innerHTML = '<option value="all">すべてのジャンル</option>';
            genres.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                select.appendChild(opt);
            });
        }

        function addQuestion() {
            const g = document.getElementById('input-genre').value || "未分類";
            const q = document.getElementById('input-q').value;
            const a = document.getElementById('input-a').value;
            if(!q || !a) return alert("問題と答えを入力してください");
            
            questions.push({g, q, a});
            localStorage.setItem('myQuizDataV2', JSON.stringify(questions));
            document.getElementById('input-q').value = '';
            document.getElementById('input-a').value = '';
            renderList();
            alert(`「${g}」に問題を追加しました`);
        }

        function renderList() {
            const list = document.getElementById('q-list');
            list.innerHTML = '';
            questions.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `[${item.g}] ${item.q}`;
                li.style.cursor = "pointer";
                li.style.marginBottom = "5px";
                li.onclick = () => { if(confirm("この問題を削除しますか？")) { questions.splice(index, 1); localStorage.setItem('myQuizDataV2', JSON.stringify(questions)); renderList(); } };
                list.appendChild(li);
            });
        }

        function startQuiz() {
            const selectedGenre = document.getElementById('select-genre-play').value;
            let targetList = (selectedGenre === 'all') ? questions : questions.filter(q => q.g === selectedGenre);
            
            if(targetList.length === 0) return alert("問題がありません");
            
            shuffled = [...targetList].sort(() => Math.random() - 0.5);
            currentIdx = 0;
            switchView('play-view');
            showQ();
        }

        function showQ() {
            document.getElementById('genre-display').textContent = shuffled[currentIdx].g;
            document.getElementById('q-display').textContent = shuffled[currentIdx].q;
            document.getElementById('a-display').textContent = "";
            document.getElementById('show-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function showAnswer() {
            document.getElementById('a-display').textContent = "正解： " + shuffled[currentIdx].a;
            document.getElementById('show-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < shuffled.length) {
                showQ();
            } else {
                alert("このジャンルの全問題を解き終わりました！");
                switchView('setup-view');
            }
        }

        // 初回起動
        updateGenreSelect();
    </script>
</body>
</html>
