<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試験対策・大型入力版</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        /* 全体の幅を広げ、ゆとりを持たせました */
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 800px; margin-bottom: 20px; box-sizing: border-box; }
        .hidden { display: none; }
        
        /* 入力欄（textarea）をすべて大きく、見やすく設定 */
        textarea, input[type="text"], select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1rem;
            font-family: inherit;
            resize: vertical; /* ユーザーが手動で高さを変えることも可能 */
        }
        textarea { min-height: 60px; }
        .label-text { font-weight: bold; font-size: 0.9rem; color: #555; display: block; margin-top: 10px; }

        .q-container { border-bottom: 2px solid #eee; padding: 20px 0; }
        .q-text { font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; line-height: 1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .opt-label { display: block; padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .opt-label:hover { background: #f8f9fa; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.3); }
        
        .correct-ans { background: #d4edda !important; border-color: #28a745 !important; font-weight: bold; }
        .wrong-ans { background: #f8d7da !important; border-color: #dc3545 !important; }
        .explanation-box { margin-top: 15px; padding: 15px; background: #e7f3ff; border-left: 5px solid #007bff; border-radius: 4px; font-size: 1rem; line-height: 1.6; }

        button { cursor: pointer; padding: 18px; border: none; border-radius: 10px; background: #007bff; color: white; font-size: 1.1rem; width: 100%; margin: 15px 0; font-weight: bold; }
        .sub-btn { background: #6c757d; }
        .add-btn { background: #28a745; }
        .genre-tag { background: #e2e3e5; padding: 3px 10px; border-radius: 4px; font-size: 0.85rem; vertical-align: middle; }
        #score-banner { font-size: 1.8rem; font-weight: bold; color: #007bff; text-align: center; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

    <div id="setup-view" class="card">
        <h2>試験対策アプリ</h2>
        <span class="label-text">ジャンルを選択</span>
        <select id="select-genre-play"></select>
        <button onclick="startExam()">試験開始（最大30問）</button>
        <hr>
        <button class="sub-btn" onclick="switchView('edit-view')">問題を追加・管理する</button>
    </div>

    <div id="exam-view" class="card">
        <div id="score-banner"></div>
        <div id="questions-list"></div>
        <button id="submit-btn" onclick="gradeExam()">回答を終了して採点する</button>
        <button id="back-btn" class="sub-btn hidden" onclick="switchView('setup-view')">トップに戻る</button>
    </div>

    <div id="edit-view" class="card hidden">
        <h2>問題の管理・追加</h2>
        
        <span class="label-text">ジャンル（例：民法、第3章など）</span>
        <input type="text" id="input-genre" placeholder="ジャンルを入力">

        <span class="label-text">問題文</span>
        <textarea id="input-q" placeholder="問題文を入力してください"></textarea>

        <span class="label-text" style="color:#28a745;">正解（必須）</span>
        <textarea id="input-a" placeholder="正解の選択肢を入力"></textarea>

        <span class="label-text">ハズレ選択肢1</span>
        <textarea id="input-w1" placeholder="間違いの選択肢1"></textarea>

        <span class="label-text">ハズレ選択肢2</span>
        <textarea id="input-w2" placeholder="間違いの選択肢2"></textarea>

        <span class="label-text">ハズレ選択肢3</span>
        <textarea id="input-w3" placeholder="間違いの選択肢3"></textarea>

        <span class="label-text">解説</span>
        <textarea id="input-note" style="min-height:100px;" placeholder="採点後に表示される解説文を入力"></textarea>

        <button class="add-btn" onclick="addQuestion()">この問題を登録する</button>
        <button class="sub-btn" onclick="switchView('setup-view')">トップへ戻る</button>
        
        <hr>
        <h3>登録済みリスト（クリックで削除）</h3>
        <ul id="q-list" style="font-size:0.9rem; text-align:left; padding-left:20px;"></ul>
    </div>

    <script>
        let questions = JSON.parse(localStorage.getItem('myQuizDataV5')) || [];
        let currentExamData = [];

        // 初期状態で試験画面を隠す
        document.getElementById('exam-view').classList.add('hidden');

        function switchView(viewId) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'setup-view') updateGenreSelect();
            if(viewId === 'edit-view') renderList();
        }

        function updateGenreSelect() {
            const select = document.getElementById('select-genre-play');
            const genres = [...new Set(questions.map(q => q.g))];
            select.innerHTML = '<option value="all">すべてのジャンルからランダムに出題</option>';
            genres.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g; opt.textContent = g;
                select.appendChild(opt);
            });
        }

        function addQuestion() {
            const g = document.getElementById('input-genre').value || "未分類";
            const q = document.getElementById('input-q').value, a = document.getElementById('input-a').value;
            const w1 = document.getElementById('input-w1').value, w2 = document.getElementById('input-w2').value, w3 = document.getElementById('input-w3').value;
            const note = document.getElementById('input-note').value || "解説はありません。";
            
            if(!q || !a || !w1 || !w2 || !w3) return alert("空欄（解説以外）をすべて埋めてください");

            questions.push({g, q, a, w: [w1, w2, w3], note});
            localStorage.setItem('myQuizDataV5', JSON.stringify(questions));
            
            ["input-q", "input-a", "input-w1", "input-w2", "input-w3", "input-note"].forEach(id => document.getElementById(id).value = "");
            renderList();
            alert("登録完了！");
        }

        function renderList() {
            const list = document.getElementById('q-list');
            list.innerHTML = '';
            questions.slice().reverse().forEach((item, revIndex) => {
                const actualIndex = questions.length - 1 - revIndex;
                const li = document.createElement('li');
                li.style.marginBottom = "10px";
                li.innerHTML = `[${item.g}] <b>${item.q.substring(0,20)}...</b> <span style="color:red; cursor:pointer;" onclick="deleteQ(${actualIndex})">[削除]</span>`;
                list.appendChild(li);
            });
        }

        function deleteQ(index) {
            if(confirm("この問題を削除しますか？")) {
                questions.splice(index, 1);
                localStorage.setItem('myQuizDataV5', JSON.stringify(questions));
                renderList();
            }
        }

        function startExam() {
            const selectedGenre = document.getElementById('select-genre-play').value;
            let targetList = (selectedGenre === 'all') ? questions : questions.filter(q => q.g === selectedGenre);
            if(targetList.length === 0) return alert("問題がありません");

            currentExamData = [...targetList].sort(() => Math.random() - 0.5).slice(0, 30);
            
            const listArea = document.getElementById('questions-list');
            listArea.innerHTML = '';
            document.getElementById('score-banner').style.display = 'none';
            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('back-btn').classList.add('hidden');

            currentExamData.forEach((qData, i) => {
                const options = [qData.a, ...qData.w].sort(() => Math.random() - 0.5);
                const qDiv = document.createElement('div');
                qDiv.className = 'q-container';
                qDiv.innerHTML = `
                    <div class="q-text">${i+1}. <span class="genre-tag">${qData.g}</span> ${qData.q}</div>
                    <div class="options-grid" id="q${i}-opts">
                        ${options.map(opt => `
                            <label class="opt-label">
                                <input type="radio" name="q${i}" value="${opt}"> ${opt}
                            </label>
                        `).join('')}
                    </div>
                    <div id="note-${i}" class="explanation-box hidden">
                        <strong>💡 解説:</strong><br>${qData.note.replace(/\n/g, '<br>')}
                    </div>
                `;
                listArea.appendChild(qDiv);
            });
            switchView('exam-view');
            window.scrollTo(0,0);
        }

        function gradeExam() {
            let score = 0;
            currentExamData.forEach((qData, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const optsDiv = document.getElementById(`q${i}-opts`);
                const labels = optsDiv.querySelectorAll('.opt-label');

                labels.forEach(label => {
                    const val = label.innerText.trim();
                    if(val === qData.a) label.classList.add('correct-ans');
                    if(selected && selected.value === val && val !== qData.a) label.classList.add('wrong-ans');
                });

                document.getElementById(`note-${i}`).classList.remove('hidden');
                if(selected && selected.value === qData.a) score++;
            });

            const banner = document.getElementById('score-banner');
            banner.style.display = 'block';
            banner.innerHTML = `試験終了！<br>${currentExamData.length}問中 ${score}問正解`;
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        updateGenreSelect();
    </script>
</body>
</html>
